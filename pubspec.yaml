name: secure_enclave_plus
description: >
  Apple Secure Enclave implementation for Flutter. Provides key generation,
  encryption, decryption, signing, and verification using hardware-backed
  elliptic curve keys.
version: 1.0.1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: SecureEnclavePlugin
