name: secure_enclave
description: secure_enclave is implementation Apple Secure Enclave for Flutter
version: 0.1.2
publish_to: none

environment:
  sdk: ">=2.17.1 <3.0.0"
  flutter: ">=2.5.0"

dependencies:
  flutter:
    sdk: flutter
  json_annotation: ^4.5.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  build_runner: ^2.1.11
  convert: ^3.0.2
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.2.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: SecureEnclavePlugin
      macos:
        pluginClass: SecureEnclavePlugin